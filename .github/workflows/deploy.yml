name: Deploy to Production

# Test-gated continuous deployment to the single-VM Docker host.
# On every push to main, run the pytest suite; only if it passes does the
# deploy job SSH in, git pull, rebuild the image, and restart the container.
# A red suite blocks the deploy.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/docker/monarch-mcp
            git pull origin main || { echo "ERROR: git pull failed (repo not updated). Fix the working tree on the server and re-run."; exit 1; }

            echo "Deploying $(git rev-parse --short HEAD) at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # Rebuild the image and restart the container. The named session
            # volume (Monarch token) and server-side .env persist across this.
            sudo docker compose build
            sudo docker compose up -d --remove-orphans

            # Drop dangling images from the rebuild.
            sudo docker image prune -f

            # Show final state + a healthz probe in the deploy log.
            sudo docker compose ps
            sleep 3
            curl -fsS "http://127.0.0.1:$(grep -E '^HOST_PORT=' .env | cut -d= -f2)/healthz" && echo " healthz OK"
